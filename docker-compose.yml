version: "3.9"

services:
  # ── PostgreSQL ───────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-history_rag}
      POSTGRES_USER:     ${POSTGRES_USER:-raguser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ragpass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # 컨테이너 첫 시작 시 스키마 자동 적용
      - ./src/backend/api/migrations/001_init_schema.sql:/docker-entrypoint-initdb.d/001_init_schema.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-raguser} -d ${POSTGRES_DB:-history_rag}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Ollama (Gemma 로컬 LLM) ──────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    # GPU 사용 시 아래 주석 해제
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # ── FastAPI 백엔드 ────────────────────────────────────────────
  backend:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL:  postgresql://${POSTGRES_USER:-raguser}:${POSTGRES_PASSWORD:-ragpass}@db:5432/${POSTGRES_DB:-history_rag}
      # Phase 5: Gemma LLM 설정
      OLLAMA_URL:    ${OLLAMA_URL:-http://ollama:11434}
      GEMMA_MODEL:   ${GEMMA_MODEL:-gemma3:27b}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      GOOGLE_MODEL:  ${GOOGLE_MODEL:-gemma-3-27b-it}
      LLM_TIMEOUT_SEC: ${LLM_TIMEOUT_SEC:-30}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    # 첫 실행 시 시드 적재 후 서버 실행
    command: >
      sh -c "python -m api.scripts.seed_db &&
             uvicorn api.main:app --host 0.0.0.0 --port 8000"

  # ── Next.js 프론트엔드 ────────────────────────────────────────
  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE: http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  ollama_data:
